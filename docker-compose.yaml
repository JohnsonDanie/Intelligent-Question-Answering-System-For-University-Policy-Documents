version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - chroma_db:/app/chroma_db
      - policy_data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        # In Docker Compose, the frontend reaches the backend via the service name.
        # "backend" resolves to the backend container on the internal Docker network.
        - VITE_API_BASE_URL=http://backend:8000
        - VITE_API_KEY=${API_KEY}
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

# Named volumes ensure persistent data even if containers are recreated.
volumes:
  chroma_db:
  policy_data:
